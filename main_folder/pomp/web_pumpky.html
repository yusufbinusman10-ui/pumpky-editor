<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pumpky v1.0 Web App</title>
<style>
*{box-sizing:border-box;}
body{margin:0;padding:0;background-color:#111;font-family:'Courier New',monospace;overflow:hidden;display:flex;height:100vh;color:white;user-select:none;}
#sidebar{width:140px;background-color:#0d2e0d;display:flex;flex-direction:column;border-right:3px solid #006400;padding:10px;gap:10px;z-index:10;justify-content:flex-start;overflow-y:auto;}
.panel-title{font-size:14px;font-weight:bold;text-align:center;border-bottom:2px solid #006400;padding-bottom:5px;color:#a2ffa2;margin-bottom:5px;}
.color-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.color-box{width:100%;height:40px;border:2px solid #222;cursor:pointer;border-radius:4px;transition:transform 0.1s;}
.color-box:hover{transform:scale(1.05);}
.color-box.active{border-color:white;box-shadow:0 0 8px #fff;}
.btn{background-color:#ffa500;color:black;border:none;padding:10px;font-weight:bold;cursor:pointer;text-align:center;border-radius:4px;font-size:13px;}
.btn:hover{filter:brightness(1.2);}
.btn-more{background-color:#ff3333;color:white;}
.btn-pens{background-color:#008000;color:white;}
.menu-panel{background-color:#222;border:2px solid #444;padding:10px;border-radius:6px;display:flex;flex-direction:column;gap:8px;font-size:12px;margin-top:5px;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;}
.toggle-btn{padding:4px 10px;font-size:11px;font-weight:bold;cursor:pointer;border:none;border-radius:3px;}
.toggle-on{background-color:#00ff00;color:black;}
.toggle-off{background-color:#ff0000;color:white;}
.pen-option{background-color:#334e68;padding:6px;text-align:center;cursor:pointer;border-radius:4px;border:1px solid #486581;font-size:12px;}
.pen-option:hover{background-color:#486581;}
.pen-option.active{border-color:white;background-color:#102a43;font-weight:bold;}
.slider-box{display:flex;flex-direction:column;gap:4px;font-size:11px;background:#004d00;padding:6px;border-radius:4px;}
input[type="range"]{width:100%;cursor:pointer;}
#canvas-container{flex:1;position:relative;background-color:black;}
canvas{display:block;width:100%;height:100%;}
</style>
</head>
<body>
<div id="sidebar">
<div class="panel-title">PUMPKY v1.0</div>
<button class="btn" id="clearBtn">Clear Board</button>
<button class="btn btn-more" id="moreMenuBtn">Settings Menu</button>
<div class="menu-panel" id="morePanel" style="display:none;">
<div class="toggle-row">
<span>Rainbow:</span>
<button class="toggle-btn toggle-off" id="rainbowToggle">OFF</button>
</div>
<div class="toggle-row">
<span>Mirror:</span>
<button class="toggle-btn toggle-off" id="mirrorToggle">OFF</button>
</div>
</div>
<button class="btn btn-pens" id="pensMenuBtn">Brushes Menu</button>
<div class="menu-panel" id="pensPanel" style="display:none;">
<div class="pen-option active" data-type="text" data-char="o">Brush (o)</div>
<div class="pen-option" data-type="text" data-char="+">Brush (+)</div>
<div class="pen-option" data-type="text" data-char="$">Brush ($)</div>
<div class="pen-option" data-type="text" data-char="-">Brush (-)</div>
<div class="pen-option" data-type="text" data-char="=">Brush (=)</div>
<div class="pen-option" data-type="text" data-char="!">Brush (!)</div>
<div class="pen-option" data-type="text" data-char="[]">Brush ([])</div>
<div class="pen-option" data-type="circle">Solid Circle</div>
</div>
<div class="slider-box">
<label>Size: <span id="sizeVal">20</span>px</label>
<input type="range" id="sizeSlider" min="5" max="120" value="20">
</div>
<div class="panel-title" style="margin-top:5px;">PALETTE</div>
<div class="color-grid" id="paletteGrid"></div>
</div>
<div id="canvas-container">
<canvas id="paintCanvas"></canvas>
</div>
<script>
const canvas=document.getElementById('paintCanvas');
const ctx=canvas.getContext('2d');
const container=document.getElementById('canvas-container');
let isDrawing=false;
let currentColor='#ff0000';
let brushType='text';
let penChar='o';
let penSize=20;
let rainbowMode=false;
let mirrorMode=false;
let hue=0;
const colorList=['#000000','#5c4033','#808080','#f5f5f5','#87ceeb','#0000ff','#ffff00','#008000','#ffc0cb','#800080','#ff0000','#ffa500','#a9a9a9'];
function resizeCanvas(){
const tempCanvas=document.createElement('canvas');
tempCanvas.width=canvas.width||container.clientWidth;
tempCanvas.height=canvas.height||container.clientHeight;
const tempCtx=tempCanvas.getContext('2d');
tempCtx.drawImage(canvas,0,0);
canvas.width=container.clientWidth;
canvas.height=container.clientHeight;
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.drawImage(tempCanvas,0,0);
}
window.addEventListener('resize',resizeCanvas);
const paletteGrid=document.getElementById('paletteGrid');
colorList.forEach(color=>{
const box=document.createElement('div');
box.className='color-box';
box.style.backgroundColor=color;
if(color.toLowerCase()===currentColor.toLowerCase())box.classList.add('active');
box.addEventListener('click',()=>{
document.querySelectorAll('.color-box').forEach(b=>b.classList.remove('active'));
box.classList.add('active');
currentColor=color;
});
paletteGrid.appendChild(box);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
});
const moreMenuBtn=document.getElementById('moreMenuBtn');
const morePanel=document.getElementById('morePanel');
moreMenuBtn.addEventListener('click',()=>{
morePanel.style.display=morePanel.style.display==='none'?'flex':'none';
});
const pensMenuBtn=document.getElementById('pensMenuBtn');
const pensPanel=document.getElementById('pensPanel');
pensMenuBtn.addEventListener('click',()=>{
pensPanel.style.display=pensPanel.style.display==='none'?'flex':'none';
});
const rainbowToggle=document.getElementById('rainbowToggle');
rainbowToggle.addEventListener('click',()=>{
rainbowMode=!rainbowMode;
rainbowToggle.innerText=rainbowMode?'ON':'OFF';
rainbowToggle.className=`toggle-btn ${rainbowMode?'toggle-on':'toggle-off'}`;
});
const mirrorToggle=document.getElementById('mirrorToggle');
mirrorToggle.addEventListener('click',()=>{
mirrorMode=!mirrorMode;
mirrorToggle.innerText=mirrorMode?'ON':'OFF';
mirrorToggle.className=`toggle-btn ${mirrorMode?'toggle-on':'toggle-off'}`;
});
document.querySelectorAll('.pen-option').forEach(option=>{
option.addEventListener('click',()=>{
document.querySelectorAll('.pen-option').forEach(o=>o.classList.remove('active'));
option.classList.add('active');
brushType=option.getAttribute('data-type');
penChar=option.getAttribute('data-char')||'';
});
});
const sizeSlider=document.getElementById('sizeSlider');
const sizeVal=document.getElementById('sizeVal');
sizeSlider.addEventListener('input',(e)=>{
penSize=parseInt(e.target.value);
sizeVal.innerText=penSize;
});
function drawShape(x,y){
let activeColor=currentColor;
if(rainbowMode){
hue=(hue+2)%360;
activeColor=`hsl(${hue},100%,50%)`;
}
ctx.fillStyle=activeColor;
if(brushType==='circle'){
ctx.beginPath();
ctx.arc(x,y,penSize/2,0,Math.PI*2);
ctx.fill();
}else{
ctx.font=`${penSize}px Courier New, monospace`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(penChar,x,y);
}
}
function handlePaint(e){
const x=e.offsetX;
const y=e.offsetY;
drawShape(x,y);
if(mirrorMode){
const mirroredX=canvas.width-x;
drawShape(mirroredX,y);
}
}
canvas.addEventListener('mousedown',(e)=>{
isDrawing=true;
handlePaint(e);
});
canvas.addEventListener('mousemove',(e)=>{
if(isDrawing)handlePaint(e);
});
window.addEventListener('mouseup',()=>{
isDrawing=false;
});
resizeCanvas();
</script>
</body>
</html>
